<mat-button-toggle-group [value]="currentLanguage" aria-label="Preferred Language" appearance="standard" name="language">
  @for(language of languages; track language){
    <mat-button-toggle (click)="useLanguage(language)"
                       [aria-label]="language"
                       [value]="language">{{language.toUpperCase()}}</mat-button-toggle>
  }
</mat-button-toggle-group>
